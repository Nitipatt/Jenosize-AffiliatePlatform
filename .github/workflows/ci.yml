name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aff
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "12345"
        ports:
          - 5555:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:12345@localhost:5555/aff?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci-test-access-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Lint adapters
        run: npm run test -w packages/adapters

      - name: Test API (unit)
        run: npm run test -w apps/api

      - name: Test API (e2e)
        run: npm run test:e2e -w apps/api

      - name: Build web
        run: npm run build -w apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
