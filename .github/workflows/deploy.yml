name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            APP_DIR="/opt/affiliate-platform"

            # Clone repo on first deploy, pull on subsequent deploys
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Write production .env from GitHub Secrets
            cat > .env <<ENVEOF
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            ENVEOF

            # Build and start all services
            docker compose -f infra/docker-compose.prod.yml --env-file .env up --build -d

            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 10

            # Run database migrations
            docker exec affiliate-api npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma

            echo "Deployment complete!"
